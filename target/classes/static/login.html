<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智能图书借阅管理系统</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-brand" aria-label="系统简介">
        <div class="brand-mark" aria-hidden="true">
            <svg class="brand-icon" viewBox="0 0 32 32" focusable="false">
                <path class="brand-icon-book" d="M8 7.5h10.5A3.5 3.5 0 0 1 22 11v14H11a3 3 0 0 0-3 3V7.5Z"/>
                <path class="brand-icon-page" d="M11 11h8"/>
                <path class="brand-icon-page" d="M11 15h6"/>
                <path class="brand-icon-node" d="M22 10.5h3.2"/>
                <path class="brand-icon-node" d="M22 16h4.5"/>
                <path class="brand-icon-node" d="M22 21.5h3.2"/>
                <circle class="brand-icon-dot" cx="26" cy="10.5" r="1.4"/>
                <circle class="brand-icon-dot" cx="28" cy="16" r="1.4"/>
                <circle class="brand-icon-dot" cx="26" cy="21.5" r="1.4"/>
            </svg>
        </div>
        <p class="eyebrow">Spring Boot 3 · JavaEE Project</p>
        <h1>智能图书借阅管理系统</h1>
        <p class="auth-copy">覆盖角色登录、图书分类、借阅归还和 AI 馆藏推荐，适合作为期末大作业第一版演示。</p>
        <div class="auth-metrics">
            <span><strong>6</strong> 张数据表</span>
            <span><strong>2</strong> 种角色</span>
            <span><strong>AI</strong> 推荐助手</span>
        </div>
    </section>

    <section class="auth-card" aria-label="登录表单">
        <div class="section-head compact">
            <p class="eyebrow">Account</p>
            <h2>登录系统</h2>
        </div>
        <form class="form-stack" method="post" action="/login">
            <label class="field">
                <span>用户名</span>
                <input name="username" autocomplete="username" required placeholder="admin 或 reader">
            </label>
            <label class="field">
                <span>密码</span>
                <input type="password" name="password" autocomplete="current-password" required placeholder="admin123 或 reader123">
            </label>
            <button class="btn primary wide" type="submit">
                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <path d="M10 17l5-5-5-5"/>
                    <path d="M15 12H3"/>
                </svg>
                登录
            </button>
        </form>
        <div class="demo-list" aria-label="演示账号">
            <div>
                <span>管理员</span>
                <code>admin / admin123</code>
            </div>
            <div>
                <span>读者</span>
                <code>reader / reader123</code>
            </div>
        </div>
    </section>
</main>
</body>
</html>
