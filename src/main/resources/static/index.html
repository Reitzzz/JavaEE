<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能图书借阅管理系统</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" aria-label="主导航">
        <div class="sidebar-brand">
            <span class="brand-mark small" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/>
                    <path d="M8 6h8"/>
                    <path d="M8 10h6"/>
                </svg>
            </span>
            <div>
                <strong>Smart Library</strong>
                <span>JavaEE Project</span>
            </div>
        </div>
        <nav class="nav-list">
            <button class="nav-item active" data-tab="books">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/></svg>
                图书管理
            </button>
            <button class="nav-item" data-tab="categories">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg>
                分类管理
            </button>
            <button class="nav-item" data-tab="borrows">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                借阅记录
            </button>
            <button class="nav-item" data-tab="ai">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/><circle cx="12" cy="12" r="3"/></svg>
                AI 助手
            </button>
        </nav>
        <form method="post" action="/logout">
            <button class="btn subtle wide" type="submit">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
                退出登录
            </button>
        </form>
    </aside>

    <main class="workspace">
        <header class="topbar">
            <div>
                <p class="eyebrow">Dashboard</p>
                <h1>智能图书借阅管理系统</h1>
            </div>
            <div class="user-pill">
                <span class="status-dot" aria-hidden="true"></span>
                <span id="currentUser">加载中</span>
            </div>
        </header>

        <section class="overview-grid" aria-label="系统概览">
            <article class="metric-tile">
                <span>馆藏图书</span>
                <strong id="bookCount">--</strong>
            </article>
            <article class="metric-tile">
                <span>可借库存</span>
                <strong id="availableCount">--</strong>
            </article>
            <article class="metric-tile">
                <span>图书分类</span>
                <strong id="categoryCount">--</strong>
            </article>
            <article class="metric-tile">
                <span>当前角色</span>
                <strong id="roleLabel">--</strong>
            </article>
        </section>

        <section id="message" class="toast" role="status" aria-live="polite" hidden></section>

        <section id="books" class="view active">
            <div class="section-head">
                <div>
                    <p class="eyebrow">Books</p>
                    <h2>图书管理</h2>
                </div>
                <div class="toolbar">
                    <label class="search-field">
                        <span class="sr-only">搜索图书</span>
                        <input id="bookKeyword" placeholder="搜索书名、作者或 ISBN">
                    </label>
                    <button id="searchBookBtn" class="btn secondary" type="button">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        搜索
                    </button>
                </div>
            </div>
            <form id="bookForm" class="panel-form admin-only">
                <label class="field"><span>ISBN</span><input name="isbn" required></label>
                <label class="field"><span>书名</span><input name="title" required></label>
                <label class="field"><span>作者</span><input name="author" required></label>
                <label class="field"><span>出版社</span><input name="publisher" required></label>
                <label class="field"><span>馆藏</span><input name="totalCopies" type="number" min="0" required></label>
                <label class="field"><span>可借</span><input name="availableCopies" type="number" min="0"></label>
                <label class="field"><span>分类</span><select name="categoryId" required></select></label>
                <button class="btn primary" type="submit">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                    新增图书
                </button>
            </form>
            <div class="table-card">
                <table>
                    <thead>
                    <tr>
                        <th>ISBN</th>
                        <th>书名</th>
                        <th>作者</th>
                        <th>分类</th>
                        <th>库存</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="bookRows"></tbody>
                </table>
            </div>
        </section>

        <section id="categories" class="view">
            <div class="section-head">
                <div>
                    <p class="eyebrow">Categories</p>
                    <h2>分类管理</h2>
                </div>
            </div>
            <form id="categoryForm" class="panel-form compact-form admin-only">
                <label class="field"><span>分类名称</span><input name="name" required></label>
                <label class="field"><span>分类描述</span><input name="description" required></label>
                <button class="btn primary" type="submit">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                    新增分类
                </button>
            </form>
            <div class="table-card">
                <table>
                    <thead>
                    <tr>
                        <th>编号</th>
                        <th>名称</th>
                        <th>描述</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="categoryRows"></tbody>
                </table>
            </div>
        </section>

        <section id="borrows" class="view">
            <div class="section-head">
                <div>
                    <p class="eyebrow">Borrowing</p>
                    <h2>借阅记录</h2>
                </div>
                <div class="toolbar">
                    <button id="loadMineBtn" class="btn secondary" type="button">我的借阅</button>
                    <button id="loadAllBorrowsBtn" class="btn secondary admin-only" type="button">全部借阅</button>
                </div>
            </div>
            <div class="table-card">
                <table>
                    <thead>
                    <tr>
                        <th>读者</th>
                        <th>图书</th>
                        <th>借出时间</th>
                        <th>应还时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="borrowRows"></tbody>
                </table>
            </div>
        </section>

        <section id="ai" class="view">
            <div class="section-head">
                <div>
                    <p class="eyebrow">AI Assistant</p>
                    <h2>AI 馆藏推荐助手</h2>
                </div>
            </div>
            <div class="ai-layout">
                <div class="ai-prompt">
                    <label class="field">
                        <span>问题</span>
                        <textarea id="aiQuestion" rows="7">请根据 JavaEE 大作业推荐两本适合学习 Spring Boot 和大模型应用开发的书。</textarea>
                    </label>
                    <button id="askAiBtn" class="btn primary" type="button">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><circle cx="12" cy="12" r="3"/></svg>
                        生成推荐
                    </button>
                </div>
                <output id="aiAnswer" class="ai-answer">AI 回复会显示在这里。</output>
            </div>
        </section>
    </main>
</div>

<script src="/js/app.js"></script>
</body>
</html>
